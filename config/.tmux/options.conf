set -g prefix C-a
set -g mouse off
set-option -g status-position top
set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -l"

# Copy & Enter in copy-mode copy selection AND send it to macOS clipboard
set -g set-clipboard on
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode Enter
bind -T copy-mode Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# catppuccin — flavor is overridden by theme.conf colors
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"

# Status bar modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -g @catppuccin_status_cpu_format "CPU: #{bar:#{cpu}} #{cpu}%"
