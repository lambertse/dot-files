# ── Claude Code Theme for Tmux ──────────────────────────
# Overrides catppuccin @thm_ variables with Claude Code palette

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── Override catppuccin @thm_ palette ───────────────────
set -g @thm_bg "#1e1b17"
set -g @thm_fg "#e8e6e3"
set -g @thm_crust "#141210"
set -g @thm_mantle "#1a1815"
set -g @thm_surface_0 "#2a2520"
set -g @thm_surface_1 "#3a352e"
set -g @thm_surface_2 "#4a4540"
set -g @thm_overlay_0 "#5a5550"
set -g @thm_overlay_1 "#6a6560"
set -g @thm_overlay_2 "#8a8580"
set -g @thm_subtext_0 "#c4a584"
set -g @thm_subtext_1 "#8a8580"

# Accent colors
set -g @thm_rosewater "#FFB38A"
set -g @thm_flamingo "#E67D22"
set -g @thm_pink "#E06C9A"
set -g @thm_mauve "#C678DD"
set -g @thm_red "#E06C75"
set -g @thm_maroon "#A14A2F"
set -g @thm_peach "#C15F3C"
set -g @thm_yellow "#D4A843"
set -g @thm_green "#98C379"
set -g @thm_teal "#56B6C2"
set -g @thm_sky "#79D0DA"
set -g @thm_sapphire "#61AFEF"
set -g @thm_blue "#61AFEF"
set -g @thm_lavender "#D9A0EC"

# ── Pane borders ────────────────────────────────────────
set -g pane-border-style "fg=#3a352e"
set -g pane-active-border-style "fg=#C15F3C"

# ── Message / command line ──────────────────────────────
set -g message-style "bg=#242019,fg=#E67D22,bold"
set -g message-command-style "bg=#242019,fg=#c4a584"

# ── Copy mode ───────────────────────────────────────────
set -g mode-style "bg=#3a2820,fg=#e8e6e3"

# ── Clock ───────────────────────────────────────────────
set -g clock-mode-colour "#C15F3C"

# ── Display panes ───────────────────────────────────────
set -g display-panes-active-colour "#C15F3C"
set -g display-panes-colour "#4a4540"
