# Display lazygit
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Run Claude Code in a separate session
bind -r y run-shell '\
  FOLDER=$(basename "#{pane_current_path}"); \
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)-$FOLDER"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude-vm"; \
  tmux display-popup -w80% -h80% -E -S "bg=#141210" "tmux attach-session -t $SESSION"'

